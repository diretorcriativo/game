<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DIRETOR CRIATIVO GAME</title>
  <style>
    :root {
      --bg: #071229;
      --panel: rgba(12, 19, 40, 0.88);
      --panel-border: rgba(255,255,255,0.10);
      --text: #f4f7ff;
      --muted: #bac7ea;
      --blue: #2f88ff;
      --blue-2: #0f46c2;
      --white: #ffffff;
      --good: #63d98e;
      --danger: #ff6479;
      --tile-a: rgba(255,255,255,0.05);
      --tile-b: rgba(26,58,120,0.06);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #132450 0%, #061128 62%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      background: rgba(7, 13, 30, 0.92);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.06;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 12px;
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .pillrow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .pill {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .legend {
      display: grid;
      gap: 8px;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 11px;
      background: rgba(255,255,255,0.05);
    }

    .legend-item.done {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .main {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      min-width: 0;
      min-height: 0;
    }

    .board-wrap {
      position: relative;
      width: min(100%, 980px);
      height: min(100%, 760px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: min(100%, 980px);
      height: auto;
      max-height: calc(100vh - 24px);
      aspect-ratio: 13 / 9;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 28px 70px rgba(0,0,0,0.38);
      background: #d7e5f8;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 4, 12, 0.68);
      backdrop-filter: blur(7px);
      z-index: 9;
      border-radius: 22px;
    }

    .overlay.show { display: flex; }

    .modal {
      width: min(92vw, 560px);
      background: linear-gradient(180deg, #1f2b52, #0f1932);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 28px 70px rgba(0,0,0,0.4);
    }

    .modal h3 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 13px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { background: var(--blue); color: #fff; }
    .secondary { background: #2d395f; color: #fff; }
    .good { background: var(--good); color: #04140a; }
    .danger { background: var(--danger); color: #fff; }

    .mobile-controls {
      position: absolute;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: none;
      grid-template-columns: 72px 72px 72px;
      grid-template-rows: 60px 60px;
      gap: 8px;
      z-index: 8;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .control-btn {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(8, 14, 30, 0.76);
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .control-up { grid-column: 2; grid-row: 1; }
    .control-left { grid-column: 1; grid-row: 2; }
    .control-down { grid-column: 2; grid-row: 2; }
    .control-right { grid-column: 3; grid-row: 2; }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding-bottom: 10px;
      }
      .legend {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .sidebar {
        padding: 10px;
        gap: 10px;
      }
      .title { font-size: 22px; }
      .subtitle, .hint { font-size: 12px; }
      .card { padding: 10px; }
      .legend { grid-template-columns: 1fr; }
      .main { padding: 8px; }
      .board-wrap { width: 100%; height: 100%; }
      canvas {
        width: 100%;
        max-height: calc(100vh - 250px);
      }
      .mobile-controls { display: grid; }
      .modal h3 { font-size: 26px; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h1 class="title">DIRETOR CRIATIVO GAME</h1>
        <p class="subtitle">Colete 7 símbolos, atravesse o labirinto mutante e fuja dos perseguidores.</p>
      </div>

      <div class="card">
        <div class="pillrow">
          <div class="pill">Fase <strong id="phaseText">1</strong>/3</div>
          <div class="pill">Itens <strong id="countText">0</strong>/7</div>
        </div>
        <h2>Objetos</h2>
        <div id="legend" class="legend"></div>
      </div>

      <div class="card hint">
        <h2>Controles</h2>
        <div>No computador, use as setas do teclado ou W A S D.</div>
        <div>No celular, use os botões na tela.</div>
        <div>Você tem 10 pontos de vida por fase.</div>
      </div>
    </aside>

    <main class="main">
      <div class="board-wrap">
        <canvas id="game" width="1040" height="720"></canvas>

        <div id="overlay" class="overlay">
          <div class="modal">
            <h3 id="modalTitle"></h3>
            <p id="modalText"></p>
            <div id="modalButtons" class="buttons"></div>
          </div>
        </div>

        <div class="mobile-controls" id="mobileControls">
          <div class="control-btn control-up" data-key="ArrowUp">▲</div>
          <div class="control-btn control-left" data-key="ArrowLeft">◀</div>
          <div class="control-btn control-down" data-key="ArrowDown">▼</div>
          <div class="control-btn control-right" data-key="ArrowRight">▶</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalButtons = document.getElementById('modalButtons');
    const legend = document.getElementById('legend');
    const phaseText = document.getElementById('phaseText');
    const countText = document.getElementById('countText');
    const mobileControls = document.getElementById('mobileControls');

    const TILE = 52;
    const COLS = 13;
    const ROWS = 9;
    const OFF_X = (canvas.width - COLS * TILE) / 2;
    const OFF_Y = (canvas.height - ROWS * TILE) / 2 + 22;
    const MAX_HP = 10;

    const itemsDef = [
      { key: 'music', label: 'Nota musical', icon: '♪' },
      { key: 'video', label: 'Câmera de filmar', icon: '🎥' },
      { key: 'photo', label: 'Câmera fotográfica', icon: '📷' },
      { key: 'heart', label: 'Coração azul', icon: '💙' },
      { key: 'art', label: 'Quadro de arte', icon: '🖼️' },
      { key: 'money', label: 'Saco de dinheiro', icon: '💰' },
      { key: 'cross', label: 'Cruz', icon: '✝' }
    ];

    const itemPool = [
      {x:1,y:1},{x:2,y:2},{x:4,y:1},{x:6,y:1},{x:8,y:1},{x:10,y:1},{x:11,y:2},
      {x:1,y:4},{x:3,y:4},{x:6,y:4},{x:9,y:4},{x:11,y:4},{x:2,y:6},{x:4,y:7},
      {x:6,y:7},{x:8,y:7},{x:10,y:7},{x:11,y:6},{x:1,y:7}
    ];

    const phases = [
      {
        name:'Brasil',
        moveCooldown:82,
        wallTick:10,
        cta:{ title:'Fase 1 concluída', text:'Você quer abrir um negócio?', buttons:[{label:'SIM', cls:'good', action:'next'},{label:'NÃO', cls:'danger', action:'link', href:'https://www.youtube.com/watch?v=cHg74pknGHQ'}] },
        pursuers:[{type:'politico',x:12,y:0,speed:840,recalc:14},{type:'juiz',x:12,y:8,speed:900,recalc:15}]
      },
      {
        name:'França',
        moveCooldown:78,
        wallTick:8,
        cta:{ title:'Fase 2 concluída', text:'Você conhece o poder da criatividade para negócios?', buttons:[{label:'SIM', cls:'good', action:'next'},{label:'NÃO', cls:'danger', action:'link', href:'https://www.youtube.com/watch?v=jUAMRlvaPGM'}] },
        pursuers:[{type:'politico',x:12,y:0,speed:760,recalc:12},{type:'juiz',x:12,y:8,speed:820,recalc:12}]
      },
      {
        name:'Japão',
        moveCooldown:72,
        wallTick:6,
        cta:{ title:'Parabéns', text:'Agora você pode fazer parte deste movimento.', buttons:[{label:'QUERO', cls:'primary', action:'link', href:'https://www.instagram.com/diretorcriativo'},{label:'JOGAR DE NOVO', cls:'secondary', action:'restart'}] },
        pursuers:[{type:'politico',x:12,y:0,speed:680,recalc:10},{type:'juiz',x:12,y:8,speed:740,recalc:10}]
      }
    ];

    const game = {
      phase: 0,
      frame: 0,
      paused: false,
      intro: true,
      keys: new Set(),
      lastMove: 0,
      items: [],
      particles: [],
      walls: [],
      pursuers: [],
      player: { x:0, y:0, hp:MAX_HP, happy:0, stunned:0 },
      hitFlash: 0
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function edgeKey(a,b,c,d) { return `${a},${b}|${c},${d}`; }

    function addWall(set, axis, x, y) {
      if (axis === 'v') {
        set.add(edgeKey(x,y,x-1,y));
        set.add(edgeKey(x-1,y,x,y));
      } else {
        set.add(edgeKey(x,y,x,y-1));
        set.add(edgeKey(x,y-1,x,y));
      }
    }

    function buildItems() {
      const pos = shuffle(itemPool).slice(0, itemsDef.length);
      return itemsDef.map((it, i) => ({ ...it, x: pos[i].x, y: pos[i].y, collected: false }));
    }

    function buildWalls(phaseIdx) {
      const count = phaseIdx === 0 ? 7 : phaseIdx === 1 ? 9 : 11;
      const list = [];
      for (let i = 0; i < count; i++) {
        list.push({ axis: i % 2 === 0 ? 'v' : 'h', x: 2 + (i % 9), y: 1 + (i % 7), dir: i % 2 === 0 ? 1 : -1 });
      }
      return list;
    }

    function buildPursuers(phaseIdx) {
      return phases[phaseIdx].pursuers.map(p => ({ ...p, lastMove: 0, path: [], pulse: Math.random() * Math.PI * 2 }));
    }

    function resetPhase(idx) {
      game.phase = idx;
      game.frame = 0;
      game.paused = false;
      game.intro = true;
      game.lastMove = 0;
      game.items = buildItems();
      game.walls = buildWalls(idx);
      game.pursuers = buildPursuers(idx);
      game.player = { x:0, y:0, hp:MAX_HP, happy:0, stunned:0 };
      game.particles = [];
      game.hitFlash = 0;
      updateLegend();
      hideModal();
    }

    function restartGame() { resetPhase(0); }
    function nextPhase() { if (game.phase < 2) resetPhase(game.phase + 1); }
    function openLink(url) { window.open(url, '_blank', 'noopener,noreferrer'); }

    function updateLegend() {
      phaseText.textContent = String(game.phase + 1);
      countText.textContent = String(game.items.filter(i => i.collected).length);
      legend.innerHTML = '';
      game.items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'legend-item' + (it.collected ? ' done' : '');
        row.innerHTML = `<span>${it.icon} ${it.label}</span><strong>${it.collected ? 'OK' : '...'}</strong>`;
        legend.appendChild(row);
      });
    }

    function showModal(title, text, buttons) {
      game.paused = true;
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalButtons.innerHTML = '';
      buttons.forEach(btn => {
        const el = document.createElement('button');
        el.className = btn.cls;
        el.textContent = btn.label;
        el.addEventListener('click', () => {
          if (btn.action === 'next') nextPhase();
          else if (btn.action === 'restart') restartGame();
          else if (btn.action === 'link') openLink(btn.href);
          else if (btn.action === 'start') { hideModal(); resetPhase(0); }
        });
        modalButtons.appendChild(el);
      });
      overlay.classList.add('show');
    }

    function hideModal() {
      overlay.classList.remove('show');
      game.paused = false;
    }

    function getClosedWalls() {
      const set = new Set();
      for (let x = 0; x < COLS; x++) {
        set.add(edgeKey(x,0,x,-1));
        set.add(edgeKey(x,ROWS-1,x,ROWS));
      }
      for (let y = 0; y < ROWS; y++) {
        set.add(edgeKey(0,y,-1,y));
        set.add(edgeKey(COLS-1,y,COLS,y));
      }

      const staticWalls = [
        ['v',1,2],['v',1,6],['v',3,1],['v',3,5],['v',5,2],['v',5,6],['v',7,1],['v',7,4],['v',9,3],['v',9,6],['v',11,2],
        ['h',2,1],['h',4,2],['h',7,1],['h',10,2],['h',2,4],['h',5,5],['h',8,4],['h',10,7],['h',4,7]
      ];

      staticWalls.forEach(w => addWall(set, w[0], w[1], w[2]));
      game.walls.forEach(w => addWall(set, w.axis, w.x, w.y));
      return set;
    }

    function canMove(x1,y1,x2,y2) {
      if (x2 < 0 || y2 < 0 || x2 >= COLS || y2 >= ROWS) return false;
      return !getClosedWalls().has(edgeKey(x1,y1,x2,y2));
    }

    function moveWalls() {
      game.walls.forEach((w, i) => {
        if (w.axis === 'v') {
          w.y += w.dir;
          if (w.y <= 1 || w.y >= ROWS - 1) {
            w.dir *= -1;
            w.y += w.dir;
          }
          if (i % 3 === 0 && game.frame % 20 === 0) w.x = 1 + ((w.x + 2) % (COLS - 1));
        } else {
          w.x += w.dir;
          if (w.x <= 1 || w.x >= COLS - 1) {
            w.dir *= -1;
            w.x += w.dir;
          }
          if (i % 3 === 1 && game.frame % 20 === 0) w.y = 1 + ((w.y + 2) % (ROWS - 1));
        }
      });
    }

    function handleMovement(now) {
      if (game.paused || game.intro || game.player.stunned > 0) return;
      if (now - game.lastMove < phases[game.phase].moveCooldown) return;

      let dx = 0, dy = 0;
      if (game.keys.has('ArrowUp') || game.keys.has('KeyW')) dy = -1;
      else if (game.keys.has('ArrowDown') || game.keys.has('KeyS')) dy = 1;
      else if (game.keys.has('ArrowLeft') || game.keys.has('KeyA')) dx = -1;
      else if (game.keys.has('ArrowRight') || game.keys.has('KeyD')) dx = 1;

      if (dx === 0 && dy === 0) return;
      const nx = game.player.x + dx;
      const ny = game.player.y + dy;
      if (canMove(game.player.x, game.player.y, nx, ny)) {
        game.player.x = nx;
        game.player.y = ny;
        checkCollection();
      }
      game.lastMove = now;
    }

    function burst(x,y,char,count) {
      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i) / count;
        game.particles.push({
          x, y,
          dx: Math.cos(a) * (1.5 + Math.random() * 1.7),
          dy: Math.sin(a) * (1.5 + Math.random() * 1.7) - 0.6,
          life: 32 + Math.random() * 16,
          char
        });
      }
    }

    function checkCollection() {
      let got = false;
      game.items.forEach(it => {
        if (!it.collected && it.x === game.player.x && it.y === game.player.y) {
          it.collected = true;
          got = true;
          burst(OFF_X + it.x*TILE + TILE/2, OFF_Y + it.y*TILE + TILE/2, '💙', 10);
        }
      });
      if (got) game.player.happy = 32;
      updateLegend();
      if (game.items.every(i => i.collected)) {
        const cta = phases[game.phase].cta;
        showModal(cta.title, cta.text, cta.buttons);
      }
    }

    function findPath(sx,sy,tx,ty) {
      const q = [[sx,sy]];
      const parent = new Map();
      const seen = new Set([`${sx},${sy}`]);

      while (q.length) {
        const [x,y] = q.shift();
        if (x === tx && y === ty) break;
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy]) => {
          const nx = x + dx;
          const ny = y + dy;
          const kk = `${nx},${ny}`;
          if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) return;
          if (seen.has(kk)) return;
          if (!canMove(x,y,nx,ny)) return;
          seen.add(kk);
          parent.set(kk, [x,y]);
          q.push([nx,ny]);
        });
      }

      const end = `${tx},${ty}`;
      if (!seen.has(end)) return [];
      const path = [];
      let cur = [tx,ty];
      while (!(cur[0] === sx && cur[1] === sy)) {
        path.unshift(cur);
        cur = parent.get(`${cur[0]},${cur[1]}`);
      }
      return path;
    }

    function updatePursuers(now) {
      if (game.paused || game.intro) return;
      game.pursuers.forEach((p, i) => {
        if (game.frame % p.recalc === 0 || !p.path.length) p.path = findPath(p.x,p.y,game.player.x,game.player.y);
        if (now - p.lastMove < p.speed) return;
        if (!p.path.length) return;
        const [nx,ny] = p.path.shift();
        if (canMove(p.x,p.y,nx,ny)) { p.x = nx; p.y = ny; }
        p.lastMove = now;
        p.pulse += 0.12 + i * 0.02;
      });

      if (game.player.stunned <= 0 && game.pursuers.some(p => p.x === game.player.x && p.y === game.player.y)) {
        game.player.hp -= 1;
        game.player.stunned = 28;
        game.hitFlash = 12;
        burst(OFF_X + game.player.x*TILE + TILE/2, OFF_Y + game.player.y*TILE + TILE/2, '⚡', 9);
        if (game.player.hp <= 0) resetPhase(game.phase);
        else {
          game.player.x = 0;
          game.player.y = 0;
          game.pursuers = buildPursuers(game.phase);
        }
      }
    }

    function updateParticles() {
      game.particles = game.particles.filter(p => p.life > 0);
      game.particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.03;
        p.life -= 1;
      });
      if (game.player.happy > 0) game.player.happy -= 1;
      if (game.player.stunned > 0) game.player.stunned -= 1;
      if (game.hitFlash > 0) game.hitFlash -= 1;
    }

    function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
    function mix(a,b,t) { return a + (b-a) * t; }

    function drawBackdrop() {
      const t = Math.min(1, game.frame / (game.phase === 0 ? 2200 : game.phase === 1 ? 1800 : 1400));
      const grad = ctx.createLinearGradient(0,0,0,canvas.height);
      if (game.phase === 0) {
        grad.addColorStop(0, `rgba(${100-70*t}, ${190-120*t}, ${255-150*t}, 1)`);
        grad.addColorStop(1, `rgba(${245-180*t}, ${225-170*t}, ${180-120*t}, 1)`);
      }
      if (game.phase === 1) {
        grad.addColorStop(0, `rgba(${150-120*t}, ${200-175*t}, ${235-165*t}, 1)`);
        grad.addColorStop(1, `rgba(${230-200*t}, ${220-190*t}, ${230-175*t}, 1)`);
      }
      if (game.phase === 2) {
        grad.addColorStop(0, `rgba(${180-160*t}, ${220-200*t}, ${255-200*t}, 1)`);
        grad.addColorStop(1, `rgba(${255-245*t}, ${230-215*t}, ${236-180*t}, 1)`);
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);

      if (game.phase === 0) {
        ctx.fillStyle = 'rgba(40,110,60,0.82)';
        for (let i = 0; i < 6; i++) {
          const x = i * 180;
          ctx.beginPath();
          ctx.moveTo(x,560);
          ctx.quadraticCurveTo(x+90,470-(i%2)*38,x+180,560);
          ctx.closePath();
          ctx.fill();
        }
      }

      if (game.phase === 1) {
        ctx.fillStyle = 'rgba(32,38,58,0.95)';
        for (let i = 0; i < 7; i++) {
          const x = i * 150;
          const h = 90 + (i % 3) * 28;
          ctx.fillRect(x, 500 - h, 120, h);
        }
      }

      if (game.phase === 2) {
        ctx.fillStyle = 'rgba(26,32,48,0.95)';
        ctx.fillRect(0, 520, canvas.width, 220);
        ctx.fillStyle = '#b22234';
        ctx.fillRect(780, 348, 16, 120);
        ctx.fillRect(850, 348, 16, 120);
        ctx.fillRect(760, 344, 126, 12);
      }
    }

    function drawBoard() {
      ctx.save();
      ctx.translate(OFF_X, OFF_Y);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(0,0,COLS*TILE,ROWS*TILE);
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(20,70,160,0.04)';
          ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
        }
      }
      const walls = getClosedWalls();
      ctx.lineWidth = 12;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#ffffff';
      walls.forEach(kk => {
        const [a,b] = kk.split('|');
        const [x1,y1] = a.split(',').map(Number);
        const [x2,y2] = b.split(',').map(Number);
        if (x2 === x1 - 1 && y2 === y1) {
          const px = x1*TILE, py = y1*TILE;
          ctx.beginPath();
          ctx.moveTo(px,py+5);
          ctx.lineTo(px,py+TILE-5);
          ctx.stroke();
        }
        if (x2 === x1 && y2 === y1 - 1) {
          const px = x1*TILE, py = y1*TILE;
          ctx.beginPath();
          ctx.moveTo(px+5,py);
          ctx.lineTo(px+TILE-5,py);
          ctx.stroke();
        }
      });
      ctx.restore();
    }

    function drawItems() {
      ctx.save();
      ctx.translate(OFF_X, OFF_Y);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      game.items.forEach((it, i) => {
        if (it.collected) return;
        const x = it.x*TILE + TILE/2;
        const y = it.y*TILE + TILE/2;
        const bob = Math.sin((game.frame + i*18) * 0.12) * 4;
        if (it.key === 'heart') {
          ctx.font = '28px Arial';
          ctx.fillText('💙', x, y + bob);
        } else {
          ctx.fillStyle = 'rgba(80,140,255,0.28)';
          ctx.beginPath();
          ctx.arc(x,y,19,0,Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = '28px Arial';
          ctx.fillText(it.icon, x, y + bob);
        }
      });
      ctx.restore();
    }

    function drawPlayer() {
      const px = OFF_X + game.player.x*TILE + TILE/2;
      const py = OFF_Y + game.player.y*TILE + TILE/2 + 8;
      const happy = game.player.happy > 0;
      const bounce = happy ? Math.sin(game.frame * 0.35) * 6 : 0;
      const armY = happy ? -18 : 4;
      const handY = happy ? -34 : 20;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(px,py+18,18,6,0,0,Math.PI*2);
      ctx.fill();

      ctx.translate(px, py + bounce);

      ctx.fillStyle = '#f0e6d2';
      ctx.beginPath();
      ctx.arc(0, -22, 12.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#10131d';
      ctx.beginPath();
      ctx.moveTo(-14, -24);
      ctx.quadraticCurveTo(-10, -42, 2, -40);
      ctx.quadraticCurveTo(12, -40, 16, -28);
      ctx.quadraticCurveTo(7, -35, -2, -33);
      ctx.quadraticCurveTo(-8, -33, -14, -24);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-10, -22);
      ctx.quadraticCurveTo(-20, -32, -16, -12);
      ctx.quadraticCurveTo(-8, -20, -5, -14);
      ctx.fill();

      ctx.strokeStyle = '#10131d';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(-5, -26);
      ctx.lineTo(0, -25);
      ctx.moveTo(5, -26);
      ctx.lineTo(10, -25);
      ctx.stroke();

      ctx.fillStyle = '#10131d';
      ctx.beginPath();
      ctx.arc(-3, -21, 1.5, 0, Math.PI * 2);
      ctx.arc(6, -21, 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#10131d';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-2, -15);
      ctx.quadraticCurveTo(4, happy ? -10 : -12, 9, -14);
      ctx.stroke();

      ctx.fillStyle = '#0f46c2';
      ctx.beginPath();
      ctx.moveTo(-17, -9);
      ctx.lineTo(12, -12);
      ctx.quadraticCurveTo(21, 2, 18, 18);
      ctx.lineTo(-14, 18);
      ctx.quadraticCurveTo(-18, 5, -17, -9);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-2, -8);
      ctx.lineTo(5, -1);
      ctx.stroke();

      ctx.strokeStyle = '#0f46c2';
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-13, -3);
      ctx.lineTo(-22, armY);
      ctx.moveTo(12, -4);
      ctx.lineTo(21, armY);
      ctx.stroke();

      ctx.fillStyle = '#f0e6d2';
      ctx.beginPath();
      ctx.arc(-22, handY, 3.5, 0, Math.PI * 2);
      ctx.arc(21, handY, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#111622';
      ctx.fillRect(-10, 18, 8, 18);
      ctx.fillRect(2, 18, 8, 18);
      ctx.restore();

      if (happy) {
        ctx.font = '22px Arial';
        ctx.fillText('💙', px, py - 76 + bounce);
      }
    }

    function drawPursuer(p) {
      ctx.save();
      ctx.translate(OFF_X + p.x*TILE + TILE/2, OFF_Y + p.y*TILE + TILE/2 + 8);
      const pulse = 1 + Math.sin(p.pulse) * 0.04;
      ctx.scale(pulse,pulse);
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(0,18,16,6,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#eedfc7';
      ctx.beginPath();
      ctx.arc(0,-14,12,0,Math.PI*2);
      ctx.fill();
      if (p.type === 'politico') {
        ctx.fillStyle = '#182236';
        ctx.fillRect(-14,-2,28,28);
        ctx.fillStyle = '#d22f3a';
        ctx.fillRect(-2,0,4,24);
        ctx.fillStyle = '#0b0f18';
        ctx.fillRect(-12,-21,24,8);
      } else {
        ctx.fillStyle = '#2d2539';
        ctx.fillRect(-14,-4,28,30);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-5,-18,10,8);
      }
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      game.particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life / 48);
        ctx.font = '18px Arial';
        ctx.fillText(p.char, p.x, p.y);
      });
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawHpBar() {
      const x = canvas.width - 210;
      const y = 20;
      const w = 140;
      const h = 12;
      ctx.fillStyle = 'rgba(8,14,28,0.82)';
      ctx.fillRect(x-10,y-8,178,30);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(x,y,w,h);
      ctx.fillStyle = '#2f88ff';
      ctx.fillRect(x,y,(game.player.hp/MAX_HP)*w,h);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.strokeRect(x,y,w,h);
      ctx.fillStyle = '#d6e4ff';
      ctx.font = 'bold 12px Arial';
      ctx.fillText(`VIDA ${game.player.hp}/${MAX_HP}`, x+34, y+10);
    }

    function drawHeader() {
      ctx.fillStyle = 'rgba(12,18,34,0.72)';
      ctx.fillRect(20,16,canvas.width-40,76);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('DIRETOR CRIATIVO GAME', 30, 42);
      ctx.font = '13px Arial';
      ctx.fillStyle = '#c6cee5';
      ctx.fillText(`Fase ${game.phase+1}  •  ${phases[game.phase].name}`, 30, 62);
      ctx.font = '12px Arial';
      ctx.fillStyle = '#9eb6f5';
      ctx.fillText('Labirinto mutante, vida limitada, 2 perseguidores', 30, 80);
      drawHpBar();
    }

    function drawIntro() {
      const p = Math.min(1, game.frame / 160);
      const alpha = 1 - p * 0.85;
      ctx.fillStyle = `rgba(4,8,18,${0.9*alpha})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.font = 'bold 54px Arial';
      ctx.fillText('DIRETOR CRIATIVO GAME', canvas.width/2, 220);
      ctx.font = '20px Arial';
      ctx.fillStyle = `rgba(210,220,255,${alpha})`;
      ctx.fillText('capture símbolos, fuja de forças e atravesse uma aventura criativa', canvas.width/2, 270);
      ctx.fillStyle = `rgba(47,136,255,${alpha})`;
      ctx.fillRect(240,330,560*p,8);
    }

    function render() {
      drawBackdrop();
      drawBoard();
      drawItems();
      game.pursuers.forEach(drawPursuer);
      drawPlayer();
      drawParticles();
      drawHeader();
      if (game.hitFlash > 0) {
        ctx.fillStyle = `rgba(47,136,255,${game.hitFlash/24})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
      if (game.intro) drawIntro();
    }

    function loop(now) {
      game.frame += 1;
      if (!game.paused && !game.intro && game.frame % phases[game.phase].wallTick === 0) moveWalls();
      handleMovement(now);
      updatePursuers(now);
      updateParticles();
      if (game.intro && game.frame > 170) game.intro = false;
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code)) e.preventDefault();
      game.keys.add(e.code);
    }, { passive: false });

    window.addEventListener('keyup', e => game.keys.delete(e.code));

    mobileControls.querySelectorAll('.control-btn').forEach(btn => {
      const key = btn.dataset.key;
      const down = ev => { ev.preventDefault(); game.keys.add(key); };
      const up = ev => { ev.preventDefault(); game.keys.delete(key); };
      btn.addEventListener('touchstart', down, { passive: false });
      btn.addEventListener('touchend', up, { passive: false });
      btn.addEventListener('touchcancel', up, { passive: false });
      btn.addEventListener('mousedown', down);
      btn.addEventListener('mouseup', up);
      btn.addEventListener('mouseleave', up);
    });

    resetPhase(0);
    showModal(
      'Bem-vindo ao Diretor Criativo Game',
      'Você está preparado(a) para atravessar uma aventura criativa, capturar os 7 símbolos e fugir das forças que tentam te parar?',
      [{ label:'ENTRAR NO JOGO', cls:'primary', action:'start' }]
    );
    requestAnimationFrame(loop);
  </script>
</body>
</html>
